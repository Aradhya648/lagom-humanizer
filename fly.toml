app = "lagom-humanizer"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 5
    soft_limit = 2

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[env]
  NODE_ENV = "production"
  PORT = "3000"
